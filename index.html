<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Translator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">
    <h1>🌐 Pro Translator</h1>

    <div class="card">

        <!-- API inputs -->
        <div class="api-box">
            <input type="text" id="apiKey" placeholder="Azure API Key">
            <input type="text" id="region" placeholder="Region">
        </div>

        <!-- Language controls -->
        <div class="lang-bar">
            <span id="detectedLang">From: Auto</span>

            <button onclick="swapLanguages()">⇄</button>

            <select id="targetLang">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="ja">Japanese</option>
            </select>
        </div>

        <!-- Text areas -->
        <div class="box">
            <textarea id="inputText" placeholder="Enter text..."></textarea>

            <div class="actions">
                <button onclick="copyText('inputText')">Copy</button>
                <button onclick="speak('inputText')">🔊</button>
                <button onclick="clearText('inputText')">Clear</button>
            </div>
        </div>

        <div class="box">
            <textarea id="outputText" placeholder="Translation..." readonly></textarea>

            <div class="actions">
                <button onclick="copyText('outputText')">Copy</button>
                <button onclick="speak('outputText')">🔊</button>
                <button onclick="clearText('outputText')">Clear</button>
            </div>
        </div>

        <button class="main-btn" onclick="translateText()">Translate 🚀</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
